      summary: Create a Research File
      description: Upload a file via multipart form and create a Research File object.
      operationId: createResearchFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
            examples:
              pdfUpload:
                summary: Upload a PDF
                value:
                  file: (binary)
      responses:
        "200":
          description: The created file object.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - id
                - file_name
                - content_type
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Unique identifier for the file.
                  file_name:
                    type: string
                    description: Original uploaded filename.
                  content_type:
                    type: string
                    description: MIME type of the file as detected/stored.
                examples:
                - id: 9c6f8b1a-2a4f-4a35-86b9-0d0b5e25d5e5
                  file_name: document.pdf
                  content_type: application/pdf
              examples:
