components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
  parameters:
    PageQuery:
      name: page
      in: query
      required: false
      description: 1-based page index.
      schema:
        type: integer
        minimum: 1
        default: 1
      examples:
        default:
          value: 1
        nextPage:
          value: 2
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Page size (items per page).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 10
      examples:
        default:
          value: 10
        typical:
          value: 25
        large:
          value: 50
  schemas:
    CreateResearchRequest:
      type: object
      additionalProperties: false
      required:
      - query
      properties:
        query:
          type: string
          description: Primary research question or instruction.
        files:
          type: array
          description: IDs of previously uploaded files to include.
