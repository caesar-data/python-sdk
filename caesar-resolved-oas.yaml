openapi: 3.1.0
info:
  version: 01-09-2025
  title: API Reference
  description: "TThe Caesar API creates and manages asynchronous research requests that search the internet and proprietary data sources, gathering evidence and synthesising a fully cited answer to your query. Control the output with a system prompt to shape the final synthesis for your application."
servers:
- url: https://api.caesar.xyz
  description: Production server
security:
- bearerAuth: []
tags:
- name: Research
  description: Endpoints for research objects and their files.
x-tagGroups:
- name: API
  tags:
  - Research
paths:
  /research:
    post:
      tags:
      - Research
      summary: Create a Research Object
      description: Start a new research job using a query and optional file IDs.
      operationId: createResearchObject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - query
              properties:
                query:
                  type: string
                  description: Primary research question or instruction.
                files:
                  type: array
                  description: IDs of previously uploaded files to include.
                  items:
                    type: string
                    format: uuid
                compute_units:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Optional compute budget for the job.
                system_prompt:
                  type: string
                  description: Optional system prompt to steer the assistant.
              examples:
              - query: Summarise latest developments in perovskite solar cells.
                files:
                - 9c6f8b1a-2a4f-4a35-86b9-0d0b5e25d5e5
                compute_units: 3
                system_prompt: Be concise and cite sources.
            examples:
              minimal:
                value:
                  query: Is lithium supply a bottleneck for EV adoption?
              withFiles:
                value:
                  query: Summarise key findings from these docs
                  files:
                  - 9c6f8b1a-2a4f-4a35-86b9-0d0b5e25d5e5
                  - 1a2b3c4d-1111-2222-3333-444455556666
                  compute_units: 3
                  system_prompt: You are a concise financial analyst.
      responses:
        "200":
          description: Research job accepted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - id
                - status
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Research job identifier.
                  status:
                    type: string
                    description: Current status of the research job.
                    enum:
                    - queued
                    - searching
                    - summarizing
                    - analyzing
                    - completed
                    - failed
                    - researching
                examples:
                - id: f2f6e5db-2c7d-4f56-bb0c-5a6b6a7a9b10
                  status: queued
              examples:
                queued:
                  value:
                    id: f2f6e5db-2c7d-4f56-bb0c-5a6b6a7a9b10
                    status: queued
        "400":
          description: Bad request — invalid input parameters.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - error
                properties:
                  error:
                    type: string
                    description: Human-readable error description.
                    examples:
                    - Body contains incorrect JSON type for field "compute_units"
              examples:
                invalidType:
                  value:
                    error: Body contains incorrect JSON type for field "compute_units"
        "401":
          description: Unauthorized — invalid or missing API key.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - error
                properties:
                  error:
                    type: string
                    description: Human-readable error description.
                    examples:
                    - Body contains incorrect JSON type for field "compute_units"
              examples:
                missingKey:
                  value:
                    error: Missing API key
        "429":
          description: Too many requests — rate limit exceeded.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - error
                properties:
                  error:
                    type: string
                    description: Human-readable error description.
                    examples:
                    - Body contains incorrect JSON type for field "compute_units"
              examples:
                ratelimited:
                  value:
                    error: Rate limit exceeded. Try again later.
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - error
                properties:
                  error:
                    type: string
                    description: Human-readable error description.
                    examples:
                    - Body contains incorrect JSON type for field "compute_units"
              examples:
                generic:
                  value:
                    error: An unexpected error occurred
    get:
      tags:
      - Research
      summary: Get Research Objects
      description: Returns a paginated list of research objects.
      operationId: getResearchObjects
      parameters:
      - name: page
        in: query
        required: false
        description: 1-based page index.
        schema:
          type: integer
          minimum: 1
          default: 1
        examples:
          default:
            value: 1
          nextPage:
            value: 2
      - name: limit
        in: query
        required: false
        description: Page size (items per page).
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 10
        examples:
          default:
            value: 10
          typical:
            value: 25
          large:
            value: 50
      responses:
        "200":
          description: A paginated list of research objects.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - data
                - pagination
                properties:
                  data:
                    type: array
                    description: List of research objects.
                    items:
                      type: object
                      additionalProperties: false
                      required:
                      - id
                      - created_at
                      - status
                      - query
                      - results
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: Research job identifier.
                        created_at:
                          type: string
                          format: date-time
                          description: ISO 8601 timestamp when the job was created.
                        status:
                          type: string
                          description: Current status of the research job.
                          enum:
                          - queued
                          - searching
                          - summarizing
                          - analyzing
                          - completed
                          - failed
                          - researching
                        query:
                          type: string
                          description: Original query.
                        content:
                          type:
                          - string
                          - "null"
                          description: Final content/synthesis (null until available).
                        transformed_content:
                          type:
                          - string
                          - "null"
                          description: "Post-processed content (e.g., formatted/converted)."
                        results:
                          type: array
                          description: Ranked retrieval results and citations.
                          items:
                            type: object
                            additionalProperties: false
                            required:
                            - score
                            - title
                            - url
                            properties:
                              score:
                                type: number
                                format: float
                                description: Relevance score (0–1).
                              title:
                                type: string
                                description: Result title.
                              url:
                                type: string
                                format: uri
                                description: Canonical URL of the result.
                              citation_index:
                                type: integer
                                minimum: 0
                                description: Index used for inline citations (if present).
                            examples:
                            - score: 0.92
                              title: IEA Global EV Outlook 2025
                              url: https://www.iea.org/reports/global-ev-outlook-2025
                              citation_index: 1
                      examples:
                      - id: 11111111-2222-3333-4444-555555555555
                        created_at: 2025-09-13T18:21:37Z
                        status: completed
                        query: Summarise key findings from these docs
                        content: Final synthesis text…
                        transformed_content: null
                        results:
                        - score: 0.91
                          title: USGS Mineral Commodity Summaries 2025
                          url: https://pubs.usgs.gov/periodicals/mcs2025/mcs2025.pdf
                          citation_index: 2
                  pagination:
                    type: object
                    additionalProperties: false
                    required:
                    - limit
                    - page
                    - has_next
                    properties:
                      limit:
                        type: integer
                        minimum: 1
                        description: Page size (items per page).
                      page:
                        type: integer
                        minimum: 1
                        description: Current page number (1-based).
                      has_next:
                        type: boolean
                        description: Whether another page is available.
                      total:
                        type: integer
                        minimum: 0
                        description: Total number of items (may be omitted).
                    examples:
                    - limit: 10
                      page: 1
                      has_next: true
                      total: 42
                examples:
                - data:
                  - id: f2f6e5db-2c7d-4f56-bb0c-5a6b6a7a9b10
                    created_at: 2025-09-14T12:00:00Z
                    status: queued
                    query: Is lithium supply a bottleneck for EV adoption?
                    content: null
                    transformed_content: null
                    results: []
                  pagination:
                    limit: 10
                    page: 1
                    has_next: true
                    total: 42
              examples:
                firstPage:
                  value:
                    data:
                    - id: f2f6e5db-2c7d-4f56-bb0c-5a6b6a7a9b10
                      created_at: 2025-09-14T12:00:00Z
                      status: queued
