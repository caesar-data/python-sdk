instances:
  - url: caesar.docs.buildwithfern.com
    custom-domain: docs.caesar.xyz

title: Caesar | API Documentation
favicon: assets/favicon.ico

logo:
  href: https://caesar.xyz
  dark: assets/dark-logo.svg
  light: assets/light-logo.svg

landing-page:
  page: Introduction
  path: pages/introduction.mdx

typography:
  # Font for headings and titles
  headingsFont:
    name: system-ui

  # Font for body text
  bodyFont:
    name: system-ui

  # Font for code snippets
  codeFont:
    name: system-ui


navigation:
  - section: Get Started
    contents:
      - page: Introduction
        path: pages/introduction.mdx
      - page: Authentication
        path: pages/authentication.mdx
      - page: Compute Units (CU)
        path: pages/cu.mdx
      - page: Prompt Guidance
        path: pages/prompts.mdx
      - page: Errors
        path: pages/errors.mdx
      - page: Rate Limits
        path: pages/rate-limits.mdx
      - page: Pagination
        path: pages/pagination.mdx
  - api: API Reference
    flattened: true
    layout:
      - research:
        - endpoint: POST /research
          title: Create research
        - endpoint: GET /research/{id}
          title: Retrieve a research object
        - endpoint: GET /research/{id}/results/{resultId}/content
          title: Retrieve raw result content
        - endpoint: GET /research
          title: List research
        - endpoint: POST /research/files
          title: Create file
        - endpoint: GET /research/files
          title: List files

colors:
  accentPrimary: '#000000'
  background: '#ffffff'

layout:
  hide-feedback: true
